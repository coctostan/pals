name: pete
display_name: PETE
description: >
  Performance Evaluation & Tuning Expert. Advisory evidence for in-scope
  query, import, algorithmic, rendering, I/O, and memory performance signals.
  PLAN/APPLY/UNIFY owns any blocking response.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 225
    description: >-
      Inspect `files_modified` source/text paths for performance-sensitive
      evidence from performance-patterns.md: query/repository paths, heavy
      imports, nested/async iteration, rendering paths, sync I/O, and
      memory/cache markers. Emit a compact table —
      `Category | Files | Status | Evidence`, Status `PASS | WARN | SKIP`.
      Inject `perf_context` entries `{category, file, marker, evidence,
      recovery}`; never invent counts, benchmarks, or risk areas. Treat
      package/dependency metadata as evidence only when the plan changes it
      directly. Output `PETE: skipped — no performance-relevant files in scope`
      when scope is empty, or `PETE: no performance concerns across {N} planned
      files` when in scope with no findings.
    refs:
      - references/performance-patterns.md
  post-apply:
    priority: 175
    description: >-
      Inspect `files_changed` source/text paths for query-loop patterns, heavy
      imports, unbounded query evidence, nested/async iteration, sync I/O, and
      memory/cache markers from performance-patterns.md. Emit one compact
      table — `File | Pattern | Status | Evidence | Recovery`, Status
      `PASS | WARN | SKIP`. Report sync I/O, unbounded queries, and
      nested/async loop risks only with current diff evidence; do not infer
      request-path or missing-pagination context from unrelated files. PETE
      emits advisory WARN findings only; PLAN/APPLY/UNIFY owns any blocking
      response. Output `PETE: skipped — no performance-relevant files in scope`
      when scope is empty, or `PETE: no performance concerns across {N} changed
      files` when in scope with no findings.
    refs:
      - references/performance-patterns.md

files:
  references:
    - references/performance-principles.md
    - references/performance-patterns.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
