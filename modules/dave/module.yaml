name: dave
display_name: DAVE
description: >
  Deploy Automation & Verification Engine. Audits CI/CD pipelines, generates
  platform-specific configurations, and guides post-deploy verification
  via /paul:deploy.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 200
    description: >-
      Discover CI/CD config files by running: find . -maxdepth 4 -name '*.yml'
      -path '*/.github/workflows/*' -o -name '.gitlab-ci.yml' -o -name
      'Dockerfile' -o -name 'docker-compose.yml' -o -name 'Jenkinsfile' 2>/dev/null.
      Output a CI inventory table: '| File | Platform | Status |' listing each
      config found (e.g., '.github/workflows/ci.yml | GitHub Actions | found').
      If NO CI config found anywhere: suggest generating one — detect project
      type from lock files (package.json=Node.js, go.mod=Go, Cargo.toml=Rust,
      requirements.txt=Python) and suggest: 'No CI detected. Add
      .github/workflows/ci.yml using the {type}-ci template from
      pipeline-generation.md.' If CI found: check coverage_gaps — does it have
      build, test, lint steps? Warn if any missing. Inject deploy_context with:
      ci_files list, platforms, coverage_gaps.
    refs:
      - references/pipeline-generation.md
  post-apply:
    priority: 175
    description: >-
      For EACH modified CI config file in files_changed: 1) Validate YAML syntax
      by running: cat {file} | python3 -c "import sys,yaml;
      yaml.safe_load(sys.stdin)" 2>&1 — if error, capture line number and
      message. Alternative: yq '.' {file} 2>&1. 2) For GitHub Actions files:
      grep for required keys — 'runs-on:' must exist, 'uses: actions/checkout'
      should exist, at least one 'run:' step with test or lint. Report missing
      keys with file path. 3) For Dockerfile: grep '^FROM' lines and check tag
      pinning — WARN if ':latest' or bare image (no tag). Recommend pinned tags.
      4) Output a validation table: '| File | Check | Result |' with PASS/FAIL/
      WARN per check (e.g., '| ci.yml | YAML syntax | PASS |', '| ci.yml |
      runs-on present | PASS |', '| Dockerfile | FROM pinned | WARN: using
      :latest |'). BLOCK on any YAML parse error — display: 'DAVE BLOCK: {file}
      has YAML syntax error at line {N}: {message}. Fix before proceeding.' WARN
      on missing best practices (no test step, unpinned FROM, no cache step). If
      no CI files in files_changed: output 'No CI config files in changed set —
      skipping DAVE post-apply.' and skip gracefully.
    refs:
      - references/deploy-verification.md

files:
  references:
    - references/deploy-principles.md
    - references/pipeline-generation.md
    - references/deploy-verification.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
