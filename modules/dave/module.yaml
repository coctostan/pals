name: dave
display_name: DAVE
description: >
  Deploy Automation & Verification Engine. Audits CI/CD pipelines, generates
  platform-specific configurations, and guides post-deploy verification
  via /paul:deploy.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 200
    description: Check files_modified for CI/CD config patterns (.github/workflows, Dockerfile, etc.); inject deploy_warning if found
    refs:
      - references/pipeline-generation.md
  post-apply:
    priority: 175
    description: If pipeline configs were modified, validate YAML/Dockerfile syntax; block on parse errors
    refs:
      - references/deploy-verification.md

files:
  references:
    - references/deploy-principles.md
    - references/pipeline-generation.md
    - references/deploy-verification.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
