name: dave
display_name: DAVE
description: >
  Deploy Automation & Verification Engine. Audits CI/CD pipelines, generates
  platform-specific configurations, and guides post-deploy verification
  via /paul:deploy.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 200
    description: Check if planned changes affect CI/CD configs; flag for review
  post-apply:
    priority: 175
    description: Validate any modified pipeline configs remain syntactically valid

files:
  references:
    - references/deploy-principles.md
    - references/pipeline-generation.md
    - references/deploy-verification.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
