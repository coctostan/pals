name: rev
display_name: REV
description: >
  Review Engine & Verification. Thorough code review via subagent
  dispatch — spawns an isolated reviewer with fresh context for
  unbiased, senior-dev-level review.
version: 1.0.0

dependencies:
  kernel: ">=2.0.0"
  modules: []
  external:
    - name: pi-subagents
      package: "@tintinweb/pi-subagents"
      required: false
      check: "Agent tool available"

hooks:
  on-demand:
    priority: 100
    description: >-
      REV runs only on `/paul:review`. It is not a PLAN/APPLY/UNIFY lifecycle
      hook and does not run automatically. Its findings are advisory unless the
      user or workflow explicitly makes them blocking. See references/review-prompt.md.
    refs:
      - references/review-prompt.md
      - references/review-checklist.md

files:
  references:
    - references/review-prompt.md
    - references/review-checklist.md
  workflows: []
  templates: []
  config: []
  rules: []

commands:
  - name: review
    description: "Run thorough code review via subagent"

platform: {}
