name: walt
display_name: WALT
description: >
  Quality gating. Captures test baselines before apply, runs tests and lint
  after apply, detects regressions, and tracks quality trends across phases.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-apply:
    priority: 100
    description: Run test suite and record baseline counts (total/passing/failing/test_command); inject test_baseline into context
    refs:
      - references/quality-runner.md
      - references/quality-detection.md
  post-apply:
    priority: 100
    description: Re-run tests + lint + typecheck; compare against pre-apply baseline; block if regressions detected
    refs:
      - references/quality-runner.md
      - references/quality-lint.md
  post-unify:
    priority: 100
    description: Compute quality delta (before vs after); append entry to quality-history.md with phase metadata
    refs:
      - references/quality-delta.md
      - references/quality-history.md

files:
  references:
    - references/quality-principles.md
    - references/quality-runner.md
    - references/quality-detection.md
    - references/quality-lint.md
    - references/quality-delta.md
    - references/quality-history.md
    - references/quality-trends.md
  workflows:
    - workflows/apply-phase-quality.md
    - workflows/quality-gate.md
  templates: []
  config: []
  rules: []

commands: []

platform: {}
