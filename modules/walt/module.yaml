name: walt
display_name: WALT
description: >
  Quality gating. Captures test baselines before apply, runs tests and lint
  after apply, detects regressions, and tracks quality trends across phases.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-apply:
    priority: 100
    description: >-
      Resolve the applicable test command from quality-runner.md/quality-detection.md.
      If available, run it before APPLY and record baseline evidence: command,
      exit code, total/passing/failing/skipped counts, named failures when available,
      and coverage if configured. Inject `test_baseline` as APPLY comparison evidence.
      If no command applies, emit 'WALT: skipped — no test runner detected'; do not
      treat skipped as zero passing/failing tests.
    refs:
      - references/quality-runner.md
      - references/quality-detection.md
  post-apply:
    priority: 100
    description: >-
      Re-run applicable tests, lint, and typecheck after APPLY. Compare test results
      against `test_baseline`; run lint/typecheck according to quality-lint.md.
      BLOCK only on new strict-mode quality regressions with expected-vs-observed
      evidence: 'WALT BLOCK: Quality regression — expected baseline or better;
      observed {summary}.' Recovery is owned by the workflow call site: fix, use an
      explicit deviation only where permitted, or stop. WARN or SKIP according to
      referenced quality rules when tools are unavailable, advisory, or non-blocking.
    refs:
      - references/quality-runner.md
      - references/quality-lint.md
  post-unify:
    priority: 100
    description: >-
      Compute quality delta from APPLY-captured WALT reports; do not re-run checks
      in UNIFY. Append one row to `.paul/QUALITY-HISTORY.md` using quality-history.md,
      creating the file with its header if missing. Return command/result/delta
      evidence for SUMMARY. If no quality data exists, append a skipped quality row
      and do not invent metrics.
    refs:
      - references/quality-delta.md
      - references/quality-history.md

files:
  references:
    - references/quality-principles.md
    - references/quality-runner.md
    - references/quality-detection.md
    - references/quality-lint.md
    - references/quality-delta.md
    - references/quality-history.md
    - references/quality-trends.md
  workflows:
    - workflows/apply-phase-quality.md
    - workflows/quality-gate.md
  templates: []
  config: []
  rules: []

commands: []

platform: {}
