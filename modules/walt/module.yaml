name: walt
display_name: WALT
description: >
  Quality gating. Captures test baselines before apply, runs tests and lint
  after apply, detects regressions, and tracks quality trends across phases.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-apply:
    priority: 100
    description: >-
      MUST run test suite and record baseline counts (total/passing/failing/
      test_command). Inject test_baseline into context. If no test command found:
      'WALT: No test suite detected — baseline is zero.'
    refs:
      - references/quality-runner.md
      - references/quality-detection.md
  post-apply:
    priority: 100
    description: >-
      MUST re-run tests + lint + typecheck. MUST compare against pre-apply
      baseline. BLOCK if regressions detected: 'WALT BLOCK: Quality regression
      — {N} tests now failing (was {M}). Fix before proceeding.'
    refs:
      - references/quality-runner.md
      - references/quality-lint.md
  post-unify:
    priority: 100
    description: >-
      MUST compute quality delta (before vs after). MUST append entry to
      .paul/quality-history.md with: date (YYYY-MM-DD), phase name, test counts
      (total/passing/failing), lint result (clean or N warnings), typecheck result
      (clean or N errors), coverage % (if available), trend direction (↑ improving
      / → stable / ↓ declining). MUST create .paul/quality-history.md if it
      doesn't exist, with header: '| Date | Phase | Tests | Lint | Typecheck |
      Coverage | Trend |'. If no quality data: 'WALT: No quality data to record
      for this phase.'
    refs:
      - references/quality-delta.md
      - references/quality-history.md

files:
  references:
    - references/quality-principles.md
    - references/quality-runner.md
    - references/quality-detection.md
    - references/quality-lint.md
    - references/quality-delta.md
    - references/quality-history.md
    - references/quality-trends.md
  workflows:
    - workflows/apply-phase-quality.md
    - workflows/quality-gate.md
  templates: []
  config: []
  rules: []

commands: []

platform: {}
