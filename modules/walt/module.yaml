name: walt
display_name: WALT
description: >
  Quality gating. Captures test baselines before apply, runs tests and lint
  after apply, detects regressions, and tracks quality trends across phases.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-apply:
    priority: 100
    description: Run test suite and record baseline counts (total/passing/failing/test_command); inject test_baseline into context
    refs:
      - references/quality-runner.md
      - references/quality-detection.md
  post-apply:
    priority: 100
    description: Re-run tests + lint + typecheck; compare against pre-apply baseline; block if regressions detected
    refs:
      - references/quality-runner.md
      - references/quality-lint.md
  post-unify:
    priority: 100
    description: >-
      Compute quality delta (before vs after). Append entry to
      .paul/quality-history.md with: date (YYYY-MM-DD), phase name, test counts
      (total/passing/failing), lint result (clean or N warnings), typecheck
      result (clean or N errors), coverage % (if available from test output),
      trend direction (↑ improving / → stable / ↓ declining compared to previous
      entry). Create .paul/quality-history.md if it doesn't exist, with header:
      | Date | Phase | Tests | Lint | Typecheck | Coverage | Trend |.
      Format as a markdown table row for easy scanning across milestones.
    refs:
      - references/quality-delta.md
      - references/quality-history.md

files:
  references:
    - references/quality-principles.md
    - references/quality-runner.md
    - references/quality-detection.md
    - references/quality-lint.md
    - references/quality-delta.md
    - references/quality-history.md
    - references/quality-trends.md
  workflows:
    - workflows/apply-phase-quality.md
    - workflows/quality-gate.md
  templates: []
  config: []
  rules: []

commands: []

platform: {}
