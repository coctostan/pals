name: reed
display_name: REED
description: >
  Resilience & Error Engineering Defense. Advisory evidence for in-scope
  retry/backoff, timeout, error-boundary, shutdown/degradation, and
  cascading-failure signals. PLAN/APPLY/UNIFY owns any blocking response.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 210
    description: >-
      Inspect `files_modified` source/text paths for resilience evidence from
      resilience-patterns.md: timeout markers, retry/backoff markers,
      error-boundary markers, shutdown/degradation handlers, and
      circuit-breaker/fallback markers. Emit a compact table —
      `Check | Status | Evidence`, Status `PASS | WARN | SKIP`. Inject
      `resilience_context` entries `{check, file, line, marker, evidence}`;
      never invent counts or coverage claims. Treat markers as evidence, not
      proof that timeouts, boundaries, or shutdown are covered. Output
      `REED: skipped — no resilience-relevant files in scope` when scope is
      empty, or `REED: no resilience concerns across {N} planned files` when in
      scope with no findings.
    refs:
      - references/resilience-patterns.md
  post-apply:
    priority: 180
    description: >-
      Inspect `files_changed` source/text paths for loop/retry markers,
      timeout evidence, error-boundary changes, catch/error handling,
      shutdown/degradation handlers, and circuit-breaker/fallback markers from
      resilience-patterns.md. Emit one compact table —
      `File | Check | Status | Evidence | Recovery`, Status
      `PASS | WARN | SKIP`. Report infinite retry, missing timeout, missing
      boundary, or missing shutdown only with current diff evidence; do not
      search unrelated component or entry files to prove absence. REED emits
      advisory WARN findings only; PLAN/APPLY/UNIFY owns any blocking response.
      Output `REED: skipped — no resilience-relevant files in scope` when scope
      is empty, or `REED: no resilience concerns across {N} changed files` when
      in scope with no findings.
    refs:
      - references/resilience-patterns.md

files:
  references:
    - references/resilience-principles.md
    - references/resilience-patterns.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
