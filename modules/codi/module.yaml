name: codi
display_name: CODI
description: >
  Codegraph-Driven Structural Injection. Dispatches at pre-plan to
  inject structural blast-radius facts (from pi-codegraph tools) into
  PLAN.md so plans carry graph-derived truth instead of guessed
  files_modified and boundaries. Extracts explicit symbols from phase
  scope, calls `impact` per-symbol with call-time failure handling,
  and injects a formatted Blast Radius sub-section via context_inject.
version: 1.0.0

dependencies:
  kernel: ">=2.0.0"
  modules: []

hooks:
  pre-plan:
    priority: 220
    description: >-
      CODI is advisory. It may inject codegraph blast-radius context into
      PLAN.md, but it never blocks planning, owns lifecycle state, widens scope,
      or invents symbols/call-sites.

      STEP 1 — Extract bounded seeds. Read only current phase detail, plan
      objective text, and explicitly listed repo-relative `.ts`, `.tsx`, `.js`,
      or `.jsx` context files. Accept only explicit prose seeds (`symbol X`,
      `function X`, backtick identifiers) plus top-level/exported declarations
      from those files. Reject nested/type-only/re-export-only declarations,
      installed-runtime paths, shell/config literals, English prose, broad
      search, semantic guessing, and tokens of 2 characters or fewer. If no
      seeds remain, emit the no-symbols skip log.

      STEP 2 — Call `impact` per seed. If unavailable, emit the tool-unavailable
      skip log. Otherwise call `impact({ symbols: [singleSymbol], changeType:
      "behavior_change" })` once per seed, never batched. Classify each outcome
      independently as resolved-with-call-sites, resolved-empty, unresolved, or
      errored. Preserve partial success.

      STEP 3 — Inject evidence or skip. Return `context_inject.blast_radius`
      with `### Blast Radius (CODI)`, resolved symbol subheadings, raw `impact`
      output, resolved-empty annotations, and unresolved entries as applicable.
      If all called symbols are unresolved, inject unresolved-only evidence.
      Suppress injection only for hook-level skips.

      STEP 4 — Emit exactly one `[dispatch] CODI: ...` line with success counts
      (N/R/U/K) or a documented skip reason. See references/codi.md for full
      extraction, impact, format, and classifier-safety rules.
    refs:
      - references/codi.md
  post-unify:
    priority: 220
    description: >-
      CODI post-unify is advisory. It appends one `.paul/CODI-HISTORY.md`
      row per UNIFY and never blocks UNIFY, owns lifecycle state, or invents
      outcomes, counts, symbols, or blast-radius evidence.

      STEP 1 — Resolve source. From `summary_path`, derive `plan_id` and the
      sibling PLAN path. Read only PLAN `<module_dispatch>` first, then SUMMARY
      `## Module Execution Reports` only if PLAN has no CODI evidence. Missing
      PLAN, hotfix, or no CODI evidence maps to `no-dispatch-found`.

      STEP 2 — Classify evidence. Choose exactly one outcome:
      `injected`, `injected-degraded`, `skipped-no-symbols`,
      `skipped-tool-unavailable`, `skipped-loop-error`, `skipped-all-empty`, or
      `no-dispatch-found`. Parse R/U/K only from the canonical success log.
      Parse Symbols only from Blast Radius symbol headings. Use `—` for fields
      absent from source evidence.

      STEP 3 — Append row. Create `.paul/CODI-HISTORY.md` with the documented
      header if missing. Append one newline-terminated data row with columns:
      `Plan`, `Date`, `Outcome`, `R`, `U`, `K`, `Symbols`, `blast_radius`.
      Preserve symbol order. Set `blast_radius=y` only for `injected` or
      `injected-degraded`; otherwise `n`.

      STEP 4 — Emit evidence. Emit one hook-entry trace and one final
      `[dispatch] CODI post-unify: ...` line. See
      references/codi-instrumentation.md for exact schema, taxonomy, read order,
      hotfix handling, degraded evidence, and classifier-safety wording.
    refs:
      - references/codi-instrumentation.md

files:
  references:
    - references/codi.md
    - references/codi-instrumentation.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
