name: seth
display_name: SETH
description: >
  Security Evaluation & Threat Hunting. Advisory evidence for in-scope
  secrets, auth/authz changes, input validation, injection risk, and
  OWASP-aligned concerns. PLAN/APPLY/UNIFY owns any blocking response.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 80
    description: >-
      Inspect `files_modified` text/source paths for secret-like literals,
      auth/authz changes, validation evidence, and injection-risk patterns
      from security-patterns.md. Emit a compact table —
      `Category | Status | Evidence`, Status `PASS | WARN | SKIP`. Secret-like
      literals emit `WARN` with `{file}:{line}` and matched-pattern evidence;
      PLAN/APPLY/UNIFY owns any blocking response. Inject `sec_warnings`
      entries `{category, file, line, pattern, recovery}`; never invent counts.
      Treat framework/library markers as evidence, not coverage proof. Output
      `SETH: skipped — no in-scope source files` when scope is empty, or
      `SETH: no security concerns across {N} planned files` when in scope with
      no findings.
    refs:
      - references/security-patterns.md
  post-apply:
    priority: 130
    description: >-
      Inspect `files_changed` source/text paths for secret-like literals,
      dangerous execution/rendering sinks, auth/authz wiring changes, and
      input-validation evidence from security-patterns.md. Emit one compact
      table — `File | Check | Status | Finding | Recovery`, Status
      `PASS | WARN | SKIP`. Secret-like literals and dangerous sinks emit
      `WARN` with `{file}:{line}`, matched pattern, and recovery owner;
      PLAN/APPLY/UNIFY owns any blocking response. Report dynamic input,
      middleware removal, or missing validation only when current diff evidence
      shows it; do not search unrelated route files to prove absence. Treat
      framework/library markers as evidence, not coverage proof. Output
      `SETH: skipped — no in-scope source files` when scope is empty, or
      `SETH: no security concerns across {N} changed files` when in scope with
      no findings.
    refs:
      - references/security-patterns.md

files:
  references:
    - references/security-principles.md
    - references/security-patterns.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
