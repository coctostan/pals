name: docs
display_name: DOCS
description: >
  Documentation Lifecycle & Oversight Companion System. Detects project
  documentation, checks for drift against code changes, validates README
  currency, and surfaces doc health visibility during the plan-apply-unify loop.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 200
    description: >-
      DOCS pre-plan is advisory. Catalog bounded markdown docs outside `.paul/*`.
      For planned source files, report explicit or nearest related docs with
      source evidence. For docs-only or module-instruction plans, emit
      `DOCS: Documentation-only scope — drift check not applicable.` Output
      `| Source File | Related Doc | Status |` and compact counts. Do not block
      planning or label docs stale without source evidence.
    refs:
      - references/doc-detection.md
  post-apply:
    priority: 250
    description: >-
      DOCS post-apply is advisory. For changed source/API/config files, compare
      only relevant README/CHANGELOG/API/proximity docs. Docs-only and
      module-instruction changes are `NOT_APPLICABLE` for drift. Output
      `| File Changed | Related Doc | Status |` with UPDATED, CANDIDATE_DRIFT,
      NO_DOC, or NOT_APPLICABLE plus counts. Do not block APPLY or label drift
      without source evidence.
    refs:
      - references/doc-drift.md

files:
  references:
    - references/doc-principles.md
    - references/doc-detection.md
    - references/doc-drift.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
