name: docs
display_name: DOCS
description: >
  Documentation Lifecycle & Oversight Companion System. Detects project
  documentation, checks for drift against code changes, validates README
  currency, and surfaces doc health visibility during the plan-apply-unify loop.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 200
    description: >-
      MUST run: `find . -maxdepth 3 -name '*.md' -not -path './.paul/*'` to build
      doc catalog. For each source file in files_modified, MUST find the nearest
      related doc (e.g., src/verify.ts → docs/verify.md). Output: '| Source File |
      Related Doc | Status |' table. Inject doc_warnings with: total docs found,
      files_modified with no nearby doc, stale doc candidates. If all files have
      nearby docs: 'DOCS: All planned files have related documentation.'
    refs:
      - references/doc-detection.md
  post-apply:
    priority: 250
    description: >-
      For EACH file in files_changed, MUST check doc drift: 1) MUST check
      README.md — if any src/ file changed and README not in files_changed,
      output: 'README.md: NOT UPDATED — DRIFT'. 2) MUST check CHANGELOG.md — if
      functional file changed and CHANGELOG not updated, output: 'CHANGELOG.md:
      NOT UPDATED — DRIFT'. 3) MUST check API.md/openapi.yaml if route/endpoint
      files changed. 4) Proximity: if src/X.ts changed, check docs/X.md. Output:
      '| File Changed | Related Doc | Status |' with UPDATED/DRIFT/NO DOC.
      Summary: 'Files modified: N, Docs updated: M, Drift warnings: K'. If no
      drift: 'DOCS: No doc drift in {N} changed files.'
    refs:
      - references/doc-drift.md

files:
  references:
    - references/doc-principles.md
    - references/doc-detection.md
    - references/doc-drift.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
