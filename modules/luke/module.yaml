name: luke
display_name: LUKE
description: >
  Layout & UX Knowledge Expert. Validates component design patterns,
  checks design system consistency, detects UX anti-patterns, and
  ensures responsive design and proper user feedback in UI code.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 185
    description: >-
      MUST identify UI files in files_modified (.tsx, .jsx, .vue, .svelte). If UI
      files found: 1) MUST run: `grep -rn '#[0-9a-fA-F]\{3,8\}\|rgb(' {ui_files}` for hardcoded
      colors and `grep -rn 'margin:.*[0-9]px\|padding:.*[0-9]px' {ui_files}` for
      raw spacing. 2) MUST run: `grep -rn 'style={{' {ui_files}` for inline styles.
      Output: '| File | Inline Styles | Hardcoded Values | Status |' table.
      Inject ux_context with: component_count,
      design_token_violations, inline_style_count. If no UI files: 'LUKE: No UI
      files in planned changes — skipping.'
    refs:
      - references/ux-patterns.md
  post-apply:
    priority: 160
    description: >-
      For EACH changed UI component file (.tsx, .jsx, .vue, .svelte): 1) Design
      consistency: grep for hardcoded colors '#[0-9a-fA-F]{3,8}' and raw spacing
      'margin:.*[0-9]px|padding:.*[0-9]px' — WARN per violation: 'LUKE WARN:
      {file}:{line} uses hardcoded {color/spacing} — use design tokens.' 2) UX
      feedback check: if file contains form submission or API calls, check for
      loading states (grep 'loading\|isLoading\|spinner\|Skeleton') and error
      handling (grep 'error\|Error'). WARN if missing: 'LUKE WARN: {file} has API
      call but no loading state.' 3) Inline styles: grep 'style={{' — WARN per
      occurrence. 4) Output UX review table: '| File | Check | Result |' with
      PASS/WARN per check. If no UI files changed: 'LUKE: No UI files in changed set.'
    refs:
      - references/ux-patterns.md

files:
  references:
    - references/ux-principles.md
    - references/ux-patterns.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
