name: iris
display_name: IRIS
description: >
  Intelligent Review & Inspection System. Provides structured code review
  guidance, pattern detection references, and inspection checklists for
  thorough code review via /paul:review.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 150
    description: Scan files_modified list for known anti-pattern signatures; inject review_flags with pattern names into context
    refs:
      - references/review-patterns.md
  post-apply:
    priority: 250
    description: Run all 25 review patterns against changed files; report findings as annotations with severity
    refs:
      - references/review-patterns.md
      - references/inspection-checklists.md

files:
  references:
    - references/review-principles.md
    - references/review-patterns.md
    - references/inspection-checklists.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
