name: iris
display_name: IRIS
description: >
  Intelligent Review & Inspection System. Provides structured code review
  guidance, pattern detection references, and inspection checklists for
  thorough code review via /paul:review.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 150
    description: Scan files_modified list for known anti-pattern signatures; inject review_flags with pattern names into context
    refs:
      - references/review-patterns.md
  post-apply:
    priority: 250
    description: >-
      Run code review patterns against changed files using real tools where
      available. For TypeScript/JavaScript projects: run
      npx eslint --no-eslintrc --rule 'complexity: [warn, 10]'
      --rule 'no-unused-vars: warn' --rule 'no-eval: error'
      --format json {changed_files} to get real complexity and security findings.
      Parse ESLint JSON output: extract rule violations with file, line, column,
      message. For hardcoded secrets: grep for patterns (sk-live, api_key=,
      password=, AWS_SECRET). Report: code smells (complexity, unused vars),
      security (eval, hardcoded secrets), with file:line references and measured
      values. Share ESLint invocation with RUBY — run once, split results by
      concern (IRIS takes code smells + security, RUBY takes complexity metrics).
    refs:
      - references/review-patterns.md
      - references/inspection-checklists.md

files:
  references:
    - references/review-principles.md
    - references/review-patterns.md
    - references/inspection-checklists.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
