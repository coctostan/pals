name: iris
display_name: IRIS
description: >
  Intelligent Review & Inspection System. Provides structured code review
  guidance, pattern detection references, and inspection checklists for
  thorough code review via /paul:review.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 150
    description: >-
      IRIS pre-plan is advisory. For readable planned text files, count literal
      `TODO`, `FIXME`, `HACK`, and `XXX` markers. Markers are review signals, not
      defects. Output `| File | Marker | Count |` with source-backed counts. If
      no readable files or no markers, emit `IRIS: No review markers in planned
      files.` Do not block planning or treat examples/placeholders as findings.
    refs:
      - references/review-patterns.md
  post-apply:
    priority: 250
    description: >-
      IRIS post-apply is advisory. Inspect only changed readable source files.
      For JS/TS, reuse an available lint result; do not require ESLint. Report
      review concerns with file:line evidence: unused symbols, dead/commented
      code, empty catches, broad catches, or review markers. Tool absence is a
      warning, not a block. If no concerns, emit `IRIS: No code review concerns
      in {N} changed files.` Do not scan unrelated files or treat
      examples/placeholders as findings.
    refs:
      - references/review-patterns.md
      - references/inspection-checklists.md

files:
  references:
    - references/review-principles.md
    - references/review-patterns.md
    - references/inspection-checklists.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
