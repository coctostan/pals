name: iris
display_name: IRIS
description: >
  Intelligent Review & Inspection System. Provides structured code review
  guidance, pattern detection references, and inspection checklists for
  thorough code review via /paul:review.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 150
    description: Scan planned files for known anti-patterns; inject review context
  post-apply:
    priority: 250
    description: Run review patterns against changed files; report findings

files:
  references:
    - references/review-principles.md
    - references/review-patterns.md
    - references/inspection-checklists.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
