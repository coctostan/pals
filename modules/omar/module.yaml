name: omar
display_name: OMAR
description: >
  Observability, Monitoring & Alert Review. Advisory evidence for in-scope
  logging, health/readiness checks, error handling, sensitive log data, and
  alert/error-tracking signals. PLAN/APPLY/UNIFY owns any blocking response.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 205
    description: >-
      Inspect `files_modified` source/text paths for logging markers,
      structured logging evidence, health/readiness evidence, and process
      error-handler changes from observability-patterns.md. Emit a compact
      table — `Check | Status | Evidence`, Status `PASS | WARN | SKIP`.
      Inject `obs_context` entries `{check, file, line, marker, evidence}`;
      never invent counts or readiness claims. Treat logger, health, and
      handler markers as evidence, not coverage proof. Output `OMAR: skipped —
      no observability-relevant files in scope` when scope is empty, or
      `OMAR: no observability concerns across {N} planned files` when in scope
      with no findings.
    refs:
      - references/observability-patterns.md
  post-apply:
    priority: 170
    description: >-
      Inspect `files_changed` source/text paths for empty catch blocks, logging
      changes, health/readiness changes, sensitive log data, and catch/error
      handling changes from observability-patterns.md. Emit one compact table —
      `File | Check | Status | Evidence | Recovery`, Status
      `PASS | WARN | SKIP`. Report removed health/readiness checks, sensitive
      logs, or swallowed errors only with current diff evidence; do not search
      unrelated route or entry files to prove absence. OMAR emits advisory WARN
      findings only; PLAN/APPLY/UNIFY owns any blocking response. Output
      `OMAR: skipped — no observability-relevant files in scope` when scope is
      empty, or `OMAR: no observability concerns across {N} changed files` when
      in scope with no findings.
    refs:
      - references/observability-patterns.md

files:
  references:
    - references/observability-principles.md
    - references/observability-patterns.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
