name: skip
display_name: SKIP
description: >
  Smart Knowledge & Information Persistence. Captures project decisions,
  rationale, and context into a searchable knowledge base. Surfaces relevant
  knowledge via /paul:knowledge.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  post-apply:
    priority: 300
    description: Scan STATE.md Decisions table and task outputs for new decisions; suggest /paul:knowledge entries
    refs:
      - references/knowledge-capture.md
  post-unify:
    priority: 200
    description: Extract decisions and rationale from SUMMARY.md; create knowledge entry suggestions with type classification
    refs:
      - references/knowledge-capture.md
      - references/knowledge-search.md

files:
  references:
    - references/knowledge-principles.md
    - references/knowledge-capture.md
    - references/knowledge-search.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
