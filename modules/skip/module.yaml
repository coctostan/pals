name: skip
display_name: SKIP
description: >
  Smart Knowledge & Information Persistence. Captures project decisions,
  rationale, and context into a searchable knowledge base. Surfaces relevant
  knowledge via /paul:knowledge.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  post-apply:
    priority: 300
    description: >-
      MUST read STATE.md Decisions table: `grep '|' .paul/STATE.md` to find rows.
      Parse each row's Decision column. For EACH decision found, MUST output a
      COMPLETE Decision Record: '## [YYYY-MM-DD] [Decision title]' followed by
      'Type: decision', 'Phase: [N]', 'Context: [why needed]', 'Decision: [what
      was chosen]', 'Alternatives considered: [list with rejection reasons]',
      'Rationale: [why this option]', 'Impact: [what this affects]'. NEVER output
      just 'decision found' or 'decision extracted' — MUST always output the full
      structured record.
    refs:
      - references/knowledge-capture.md
  post-unify:
    priority: 200
    description: >-
      MUST read SUMMARY.md: `cat .paul/phases/*/SUMMARY.md` to find content. For
      EACH decision, rationale, trade-off, or lesson, MUST produce the COMPLETE
      knowledge entry using the matching template from knowledge-capture.md.
      Decision Record: date, title, context, decision, alternatives, rationale,
      impact. Rationale Note: date, title, explanation, key factors. Trade-off
      Analysis: date, title, options matrix, chosen option, reasoning. Lesson
      Learned: date, title, what happened, root cause, lesson, action items.
      NEVER output just 'knowledge extracted' — MUST always output the full
      structured entry with all required fields populated.
    refs:
      - references/knowledge-capture.md
      - references/knowledge-search.md

files:
  references:
    - references/knowledge-principles.md
    - references/knowledge-capture.md
    - references/knowledge-search.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
