name: skip
display_name: SKIP
description: >
  Smart Knowledge & Information Persistence. Captures project decisions,
  rationale, and context into a searchable knowledge base. Surfaces relevant
  knowledge via /paul:knowledge.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  post-apply:
    priority: 300
    description: >-
      SKIP post-apply is advisory. Inspect only the current APPLY task evidence
      and plan notes provided to the hook. Do not scan all STATE rows,
      historical summaries, or unrelated `.paul/*` files.

      Return compact knowledge candidates only for explicit source-backed
      decisions, rationales, trade-offs, constraints, or lessons. Each candidate
      must include source path/section, phase/plan, type, title, context,
      substantive content, and impact. Do not invent missing fields; emit a
      skip or incomplete-entry note when source evidence is insufficient.

      SKIP returns candidates for workflow-owned reporting. It does not own
      lifecycle truth or `.paul/*` writes. See references/knowledge-capture.md.
    refs:
      - references/knowledge-capture.md
  post-unify:
    priority: 200
    description: >-
      SKIP post-unify is advisory. Inspect only the current `summary_path` and
      workflow-provided UNIFY evidence. Do not read every SUMMARY or unrelated
      `.paul/*` history.

      Return compact knowledge entries only when the current source explicitly
      supports all required fields from references/knowledge-capture.md. Each
      entry must include source path/section, phase/plan, type, title, context,
      substantive content, and impact. Use `—` only for optional fields; do not
      invent decisions, rationales, alternatives, lessons, or impacts.

      If no complete source-backed entry exists, emit a no-knowledge skip line.
      SKIP returns entries for workflow-owned reporting/persistence; it does not
      own lifecycle truth or `.paul/*` lifecycle writes.
    refs:
      - references/knowledge-capture.md
      - references/knowledge-search.md

files:
  references:
    - references/knowledge-principles.md
    - references/knowledge-capture.md
    - references/knowledge-search.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
