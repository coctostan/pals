name: skip
display_name: SKIP
description: >
  Smart Knowledge & Information Persistence. Captures project decisions,
  rationale, and context into a searchable knowledge base. Surfaces relevant
  knowledge via /paul:knowledge.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  post-apply:
    priority: 300
    description: >-
      Scan STATE.md Decisions table and task outputs for new decisions.
      For each decision found, format it as a structured Decision Record using
      knowledge-capture.md templates. Include: date, title, type
      (decision/rationale/trade-off/constraint/lesson), phase, context, decision
      text, alternatives considered, rationale, and impact. Output the formatted
      entry ready for /paul:knowledge — not just 'decision found'.
    refs:
      - references/knowledge-capture.md
  post-unify:
    priority: 200
    description: >-
      Extract decisions and rationale from SUMMARY.md. For each, produce a
      formatted knowledge entry using the appropriate template from
      knowledge-capture.md (Decision Record, Rationale Note, Trade-off Analysis,
      Constraint, or Lesson Learned). Include all required fields: date, title,
      type, phase, content. Output structured entries with context and rationale,
      not just 'decision found' or 'knowledge extracted'.
    refs:
      - references/knowledge-capture.md
      - references/knowledge-search.md

files:
  references:
    - references/knowledge-principles.md
    - references/knowledge-capture.md
    - references/knowledge-search.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
