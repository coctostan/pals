name: ruby
display_name: RUBY
description: >
  Refactor Utility & Better-code Yielder. Scans for tech debt, suggests
  refactoring opportunities, and provides prioritized improvement guidance
  via /paul:refactor.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 250
    description: >-
      MUST run: `wc -l {files_modified}` to pre-screen file sizes. Flag files >300
      lines as debt candidates. Note that post-unify will use ESLint complexity
      analysis (shared with IRIS). Inject debt_flags with file paths and line
      counts. If all files <300 lines: 'RUBY: No preliminary debt indicators in
      planned files.'
    refs:
      - references/debt-detection.md
  post-unify:
    priority: 300
    description: >-
      MUST run: `npx eslint --no-eslintrc --rule 'complexity: [warn, 10]' --format
      json {changed_files}` (shared from IRIS post-apply run, or run independently
      if IRIS didn't run). Parse complexity rule violations: report ACTUAL
      cyclomatic complexity per function. Thresholds: >10 acceptable, >20 WARN,
      >30 critical. MUST run: `wc -l {changed_files}` for file-level metrics:
      >300 WARN, >500 critical. Output specific refactoring suggestions: 'Extract
      function X (complexity: {N}) into smaller units.' If ESLint unavailable, fall
      back to `wc -l` and `grep` only. If no debt: 'RUBY: No technical debt
      concerns in changed files.'
    refs:
      - references/refactor-patterns.md

files:
  references:
    - references/refactor-principles.md
    - references/debt-detection.md
    - references/refactor-patterns.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
