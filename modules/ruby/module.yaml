name: ruby
display_name: RUBY
description: >
  Refactor Utility & Better-code Yielder. Scans for tech debt, suggests
  refactoring opportunities, and provides prioritized improvement guidance
  via /paul:refactor.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 250
    description: >-
      RUBY pre-plan is advisory. For planned readable source files, report debt
      review candidates with source path and reason. Docs-only and
      module-instruction scope is not code debt. If none, emit `RUBY: No
      preliminary debt indicators in planned files.` Do not block planning or
      invent metrics.
    refs:
      - references/debt-detection.md
  post-unify:
    priority: 300
    description: >-
      RUBY post-unify is advisory. Inspect only changed readable source files.
      Use existing lint/complexity output when available; otherwise report only
      measured file size and explicit patterns from references/refactor-patterns.md,
      including Extract Pure Core when decisions/data transformations are mixed
      with side effects and the change can stay behavior-preserving, test-backed,
      and local-idiom aware. Docs-only and module-instruction changes are
      `NOT_APPLICABLE` for code debt. Metrics must be measured, not estimated.
      Tool absence is a warning, not a block. If no debt is found, emit `RUBY: No
      technical debt concerns in changed files.`
    refs:
      - references/refactor-patterns.md

files:
  references:
    - references/refactor-principles.md
    - references/debt-detection.md
    - references/refactor-patterns.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
