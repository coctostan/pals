name: ruby
display_name: RUBY
description: >
  Refactor Utility & Better-code Yielder. Scans for tech debt, suggests
  refactoring opportunities, and provides prioritized improvement guidance
  via /paul:refactor.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 250
    description: Check files_modified against debt detection heuristics; inject debt_flags with file paths and debt types
    refs:
      - references/debt-detection.md
  post-unify:
    priority: 300
    description: Scan SUMMARY.md files_modified for new debt patterns; report as annotations with refactor suggestions
    refs:
      - references/refactor-patterns.md

files:
  references:
    - references/refactor-principles.md
    - references/debt-detection.md
    - references/refactor-patterns.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
