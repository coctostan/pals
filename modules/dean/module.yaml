name: dean
display_name: DEAN
description: >
  Dependency Evaluation & Audit Notifier. Detects package managers, audits
  for vulnerabilities and outdated packages, and provides dependency health
  visibility via /paul:deps.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 50
    description: Run dependency audit for detected package managers; inject dep_warnings with severity counts into plan context
    refs:
      - references/vulnerability-audit.md
  post-apply:
    priority: 150
    description: Re-run dependency audit; compare against pre-plan baseline; block if new critical/high vulnerabilities introduced
    refs:
      - references/vulnerability-audit.md

files:
  references:
    - references/dependency-principles.md
    - references/dependency-detection.md
    - references/vulnerability-audit.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
