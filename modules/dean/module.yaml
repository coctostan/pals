name: dean
display_name: DEAN
description: >
  Dependency Evaluation & Audit Notifier. Detects package managers, audits
  for vulnerabilities and outdated packages, and provides dependency health
  visibility via /paul:deps.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 50
    description: >-
      Run dependency audit using pnpm audit --json (or ecosystem equivalent from
      vulnerability-audit.md). Parse severity levels from JSON output. Inject
      dep_warnings with severity breakdown: critical, high, moderate, low counts.
    refs:
      - references/vulnerability-audit.md
  post-apply:
    priority: 150
    description: >-
      Re-run dependency audit using pnpm audit --json (or ecosystem equivalent).
      Parse severity levels from JSON output. Compare against pre-plan baseline.
      Blocking rules: BLOCK if any NEW critical or high severity vulnerabilities.
      WARN (non-blocking) if new moderate severity. IGNORE new low severity.
      Display: severity breakdown table (critical/high/moderate/low counts, new
      vs pre-existing), specific package names and CVEs for blocking issues.
    refs:
      - references/vulnerability-audit.md

files:
  references:
    - references/dependency-principles.md
    - references/dependency-detection.md
    - references/vulnerability-audit.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
