name: dean
display_name: DEAN
description: >
  Dependency Evaluation & Audit Notifier. Detects package managers, audits
  for vulnerabilities and outdated packages, and provides dependency health
  visibility via /paul:deps.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 50
    description: >-
      Detect audit scope from dependency manifests/lockfiles: pnpm-lock.yaml,
      package-lock.json, yarn.lock, go.mod, Cargo.toml, requirements.txt,
      Pipfile, Gemfile. Run the matching audit command from vulnerability-audit.md
      only when the tool and registry access are available. Parse severity counts
      and package/advisory IDs when provided. Treat `.paul/dean-baseline.json` as
      DEAN vulnerability baseline evidence, not lifecycle truth. If a fresh baseline
      exists, compute critical/high deltas: PASS when delta <= 0; BLOCK on new
      critical/high with expected-vs-observed evidence. If no fresh baseline exists,
      BLOCK on current critical vulnerabilities with package/advisory evidence;
      otherwise carry current counts forward as APPLY comparison evidence. On stale
      baseline, report staleness and use the no-fresh-baseline rule. If the audit
      is unavailable or fails before producing parseable counts, emit compact
      evidence with reason and install/auth/network hint; do not invent counts.
      Recovery is owned by the workflow call site: fix, request/record an approved
      baseline or override where permitted, or stop.
    refs:
      - references/vulnerability-audit.md
  post-apply:
    priority: 150
    description: >-
      Re-run the same audit command used in pre-plan when available. Compare
      current severity counts against APPLY comparison evidence and report
      '| Severity | Before | After | New |'. BLOCK only on new critical/high
      vulnerabilities with package/advisory evidence and expected-vs-observed
      counts. WARN on new moderate vulnerabilities; ignore new low vulnerabilities.
      If the audit is unavailable or fails before producing parseable counts, emit
      compact evidence with reason and do not invent counts. Recovery is owned by
      the workflow call site: fix, request/record an approved override where
      permitted, or stop.
    refs:
      - references/vulnerability-audit.md

files:
  references:
    - references/dependency-principles.md
    - references/dependency-detection.md
    - references/vulnerability-audit.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
