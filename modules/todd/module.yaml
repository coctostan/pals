name: todd
display_name: TODD
description: >
  Test-Driven Development enforcement. Detects TDD candidates during planning,
  structures plans as RED-GREEN-REFACTOR, and enforces phase discipline during
  apply execution.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 100
    description: >-
      MUST run: `find . -name '*.test.*' -o -name '*.spec.*' -o -name
      '__tests__' -type d 2>/dev/null | head -20` to detect test files. MUST run:
      `grep -rn 'jest\|vitest\|mocha\|pytest\|go test' package.json Makefile
      Cargo.toml 2>/dev/null` to detect test frameworks. Output: '| Framework |
      Test Files | Status |' table. Inject tdd_candidates and tdd_type into plan
      context. If no test files: 'TODD: No test infrastructure detected —
      consider adding tests.'
    refs:
      - references/tdd-detection.md
      - references/tdd-plan-generation.md
  post-plan:
    priority: 100
    description: >-
      If plan type is tdd, MUST restructure tasks into RED-GREEN-REFACTOR sequence
      with phase gates. If plan type is execute BUT pre-plan detected tdd_candidates
      covering the planned files, MUST suggest to the user: 'Test coverage exists
      for the planned changes (tdd_candidates: {files}). Consider changing plan type
      to tdd for RED-GREEN-REFACTOR enforcement.' Let the user decide — do NOT
      auto-change the type.
    refs:
      - references/tdd-plan-generation.md
  pre-apply:
    priority: 50
    description: >-
      If the approved PLAN is `type: tdd` or a task explicitly declares RED/test-first
      work, verify RED evidence before implementation: the first relevant task creates
      a failing test or an existing test file plus failing RED result is recorded.
      BLOCK only when implementation would start without required RED evidence:
      'TODD BLOCK: RED evidence missing before implementation — expected test-first
      task or failing RED result; observed none. Parent APPLY decides recovery: fix
      task order, record an approved deviation if the workflow permits, or stop.'
      For docs/reference-only or non-TDD scopes with no RED/test-first task, emit
      'TODD: skipped — no TDD enforcement for this scope.'
    refs:
      - references/tdd-execution.md
  post-task:
    priority: 100
    description: >-
      For TDD tasks with an available test command, run the relevant tests after each
      RED/GREEN/REFACTOR or implementation task and compare against the prior task
      or pre-apply baseline. BLOCK only on new regressions with observed evidence:
      'TODD BLOCK: Tests regressed after Task {N} — expected no new failures;
      observed {failing_count} new failing tests: {test_names_or_summary}. Parent
      APPLY decides recovery: fix, retry within plan limits, record an approved
      deviation if the workflow permits, or stop.' If no test command applies, emit
      a compact skip with reason.
    refs:
      - references/tdd-execution.md
  post-apply:
    priority: 200
    description: >-
      For TDD scopes with an available full-suite command, run the suite after APPLY
      and compare failures against the baseline. PASS when no new failures remain,
      and suggest REFACTOR candidates from changed files when useful. BLOCK only on
      new or unresolved regressions: 'TODD BLOCK: {N} new/unresolved tests failing
      after APPLY — expected baseline or better; observed {summary}. Parent APPLY
      decides recovery: fix, record an approved deviation if the workflow permits,
      or stop before UNIFY.' If no suite applies, emit a compact skip with reason.
    refs:
      - references/tdd.md

files:
  references:
    - references/tdd.md
    - references/tdd-detection.md
    - references/tdd-plan-generation.md
    - references/tdd-execution.md
    - references/coverage-detection.md
  workflows:
    - workflows/plan-phase-tdd.md
  templates: []
  config: []
  rules: []

commands: []

platform: {}
