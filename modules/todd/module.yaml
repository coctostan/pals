name: todd
display_name: TODD
description: >
  Test-Driven Development enforcement. Detects TDD candidates during planning,
  structures plans as RED-GREEN-REFACTOR, and enforces phase discipline during
  apply execution.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 100
    description: Scan planned files for test files/frameworks; inject tdd_candidates and tdd_type into plan context
    refs:
      - references/tdd-detection.md
      - references/tdd-plan-generation.md
  post-plan:
    priority: 100
    description: >-
      If plan type is tdd, restructure tasks into RED-GREEN-REFACTOR sequence
      with phase gates. If plan type is execute BUT pre-plan detected
      tdd_candidates covering the planned files, suggest to the user: 'Test
      coverage exists for the planned changes (tdd_candidates: {files}). Consider
      changing plan type to tdd for RED-GREEN-REFACTOR enforcement.' Let the user
      decide — do not auto-change the type.
    refs:
      - references/tdd-plan-generation.md
  pre-apply:
    priority: 50
    description: Verify test files exist or are first in task order; block if RED phase would be skipped
    refs:
      - references/tdd-execution.md
  post-task:
    priority: 100
    description: Run test suite after each task; block if tests regress from previous task's state
    refs:
      - references/tdd-execution.md
  post-apply:
    priority: 200
    description: Run full test suite; if all green, suggest REFACTOR candidates from changed files
    refs:
      - references/tdd.md

files:
  references:
    - references/tdd.md
    - references/tdd-detection.md
    - references/tdd-plan-generation.md
    - references/tdd-execution.md
    - references/coverage-detection.md
  workflows:
    - workflows/plan-phase-tdd.md
  templates: []
  config: []
  rules: []

commands: []

platform: {}
