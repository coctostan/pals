name: arch
display_name: ARCH
description: >
  Architecture & Design advisor. Surfaces detected structural patterns,
  flags candidate boundary drift between layers with concrete evidence,
  and provides onboarding-aware context. Functional-first advisory only
  (functional-first, not functional-only):
  may note side-effect boundary drift (Pure Core, Explicit Effects) when
  in-scope evidence is available, while preserving project conventions
  and local idioms. Advisory by default; PLAN/APPLY/UNIFY owns any
  blocking response.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 75
    description: >-
      Advisory pre-plan architecture context. Scope is `files_modified` and
      their parent directory paths only; never run codebase-wide finds.
      Match those paths against the patterns enumerated in
      architecture-patterns.md (MVC, Clean/Hexagonal, 3-Tier, Feature-based,
      Flat) and report the detected pattern as evidence. For each path in
      `files_modified`, compare its directory to the pattern's layer mapping
      and surface mismatches as 'ARCH advisory: {file} sits in {layer};
      expected {expected} for {type}'. God-file (>500 lines), high directory
      fan-out (>25 files), and deep nesting (>6 levels) emit advisory WARN
      only when triggered by a `files_modified` entry, citing
      `{file}:{metric}={value}`. Circular dependencies between planned files
      emit advisory WARN with `{file_a} → {file_b}` evidence;
      PLAN/APPLY/UNIFY owns any blocking response. Functional-first,
      not functional-only (functional-first),
      advisory: may note side-effect boundary drift (Pure Core, Explicit
      Effects) when in-scope evidence shows domain logic reading env/
      clock/filesystem/network/process state directly, or controllers
      mixing orchestration, persistence, and business rules inline;
      preserves project conventions and local idioms and never forces a
      functional architecture. Inject `arch_context`
      with `detected_pattern`, `layer_map`, and `structural_warnings` (each
      entry carries `{file, metric, value}`; never invent entries). Output
      `ARCH: skipped — no in-scope source files` when scope is empty, or
      `ARCH: no concerns across {N} planned files (pattern={detected_pattern})`
      when in scope with no findings.
    refs:
      - references/architecture-patterns.md
      - references/architecture-onboarding.md
  post-apply:
    priority: 125
    description: >-
      For each file in `files_changed`, extract its import targets and
      resolve them against `arch_context.layer_map` and the rules in
      architecture-patterns.md. Emit a single boundary-check table —
      columns `File | Import | From Layer | To Layer | Status`, Status one
      of `PASS | VIOLATION | WARN` — with one row per resolved import;
      never invent rows. Convention drift (file in an unexpected directory
      for its type) appears as a `WARN` row citing the expected layer.
      God-file (>500 lines) and responsibility-creep (file grew by >100
      lines vs. prior revision) emit advisory WARN rows only when
      triggered by a `files_changed` entry, citing
      `{file}:{metric}={value}`. Functional-first, not functional-only (functional-first),
      advisory: may emit a
      side-effect boundary drift WARN (Pure Core, Explicit Effects) when
      `files_changed` evidence shows domain logic taking direct env/clock/
      filesystem/network/process dependencies, or transport/controller
      code mixing orchestration, persistence, and business rules inline;
      preserves project conventions and local idioms and never forces a
      functional architecture. PLAN/APPLY/UNIFY owns any blocking
      response to table findings. Output `ARCH: skipped — no in-scope
      source files` when scope is empty, or `ARCH: no boundary or drift
      findings across {N} changed files` when in scope with no findings.
    refs:
      - references/architecture-drift.md
      - references/architecture-patterns.md

files:
  references:
    - references/architecture-principles.md
    - references/architecture-patterns.md
    - references/architecture-drift.md
    - references/architecture-onboarding.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
