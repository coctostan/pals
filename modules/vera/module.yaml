name: vera
display_name: VERA
description: >
  Verification & Regulatory Awareness. Advisory evidence for in-scope PII
  handling, consent, deletion/retention, encryption, sensitive-data exposure,
  and privacy-regulation signals. PLAN/APPLY/UNIFY owns any blocking response.
version: 1.0.0

dependencies:
  kernel: ">=0.4.0"
  modules: []

hooks:
  pre-plan:
    priority: 215
    description: >-
      Inspect `files_modified` source/text paths for privacy evidence from
      privacy-patterns.md: PII-like field names, consent/privacy markers,
      deletion/erasure/anonymization paths, encryption/hash markers, and
      sensitive-data exposure signals. Emit a compact table —
      `Check | Status | Evidence`, Status `PASS | WARN | SKIP`. Inject
      `privacy_context` entries `{check, file, line, marker, evidence}`;
      never invent counts or compliance claims. Treat markers as evidence, not
      proof that consent, deletion, or encryption coverage exists. Output
      `VERA: skipped — no privacy-relevant files in scope` when scope is empty,
      or `VERA: no privacy concerns across {N} planned files` when in scope
      with no findings.
    refs:
      - references/privacy-patterns.md
  post-apply:
    priority: 185
    description: >-
      Inspect `files_changed` source/text paths for PII-like log exposure,
      PII-like storage/collection paths, consent/privacy changes,
      deletion/retention handling, encryption/hash evidence, and hardcoded
      PII-like test data from privacy-patterns.md. Emit one compact table —
      `File | Check | Status | Evidence | Recovery`, Status
      `PASS | WARN | SKIP`. Report PII-like logs, missing consent, missing
      encryption, or hardcoded test PII only with current diff evidence; do not
      search unrelated forms, endpoints, schemas, or tests to prove absence.
      VERA emits advisory WARN findings only; PLAN/APPLY/UNIFY owns any
      blocking response. Output `VERA: skipped — no privacy-relevant files in
      scope` when scope is empty, or `VERA: no privacy concerns across {N}
      changed files` when in scope with no findings.
    refs:
      - references/privacy-patterns.md

files:
  references:
    - references/privacy-principles.md
    - references/privacy-patterns.md
  workflows: []
  templates: []
  config: []
  rules: []

commands: []

platform: {}
