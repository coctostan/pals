# CARL Rule Catalog
# Maps technology signatures to suggested domain rules.
# Used by *scan command to detect technologies and suggest CARL domains.

technologies:

  nextjs:
    name: "Next.js"
    detect:
      - file: "next.config.*"
      - package_json: "next"
    domain: "nextjs"
    recall: "next, nextjs, app router, server component, pages"
    rules:
      - "Use App Router (app/) over Pages Router (pages/) for new routes"
      - "Prefer Server Components by default — add 'use client' only when needed"
      - "Use next/image for all images (automatic optimization and lazy loading)"
      - "Use next/link for all internal navigation (client-side transitions)"
      - "Colocate loading.tsx and error.tsx with page.tsx in route segments"

  react:
    name: "React"
    detect:
      - package_json: "react"
    domain: "react"
    recall: "react, component, jsx, tsx, hooks, state"
    rules:
      - "Use functional components with hooks — no class components for new code"
      - "Lift state to the lowest common ancestor that needs it"
      - "Extract custom hooks when logic is reused across 2+ components"
      - "Use React.memo only after measuring a real performance problem"

  vue:
    name: "Vue"
    detect:
      - file: "vue.config.*"
      - file: "nuxt.config.*"
      - package_json: "vue"
    domain: "vue"
    recall: "vue, vuex, pinia, composition api, nuxt"
    rules:
      - "Use Composition API (setup/script setup) over Options API for new components"
      - "Use defineProps and defineEmits for component contracts"
      - "Prefer Pinia over Vuex for state management"
      - "Use v-bind shorthand (:attr) and v-on shorthand (@event) consistently"

  python:
    name: "Python"
    detect:
      - file: "pyproject.toml"
      - file: "requirements.txt"
      - file: "setup.py"
      - file: "Pipfile"
    domain: "python"
    recall: "python, pip, venv, django, flask, fastapi"
    rules:
      - "Use type hints on all function signatures"
      - "Use pathlib.Path over os.path for file system operations"
      - "Use f-strings over .format() or % formatting"
      - "Prefer list/dict/set comprehensions over manual loops for transformations"
      - "Use context managers (with) for resource management (files, connections)"

  go:
    name: "Go"
    detect:
      - file: "go.mod"
    domain: "golang"
    recall: "go, golang, goroutine, go mod"
    rules:
      - "Handle every error explicitly — no blank identifier for errors (_ = err)"
      - "Use defer for cleanup operations (close files, unlock mutexes)"
      - "Return errors instead of panicking — panic only for unrecoverable states"
      - "Use short variable names in small scopes, descriptive names in larger scopes"
      - "Prefer table-driven tests for multiple test cases"

  rust:
    name: "Rust"
    detect:
      - file: "Cargo.toml"
    domain: "rust"
    recall: "rust, cargo, crate, borrow, lifetime"
    rules:
      - "Use Result<T, E> for recoverable errors, panic only for bugs"
      - "Prefer iterators and combinators (.map, .filter) over manual loops"
      - "Use clippy lints — run cargo clippy before committing"
      - "Derive common traits (Debug, Clone, PartialEq) unless there's a reason not to"

  typescript:
    name: "TypeScript"
    detect:
      - file: "tsconfig.json"
      - file: "tsconfig.*.json"
    domain: "typescript"
    recall: "typescript, ts, types, interface, generic"
    rules:
      - "Enable strict mode in tsconfig.json"
      - "Use unknown over any for untyped values — narrow with type guards"
      - "Prefer type aliases over interfaces for union types and computed properties"
      - "Use const assertions (as const) for literal types and readonly objects"

  nodejs:
    name: "Node.js"
    detect:
      - file: "package.json"
    domain: "nodejs"
    recall: "node, npm, yarn, pnpm, express, koa"
    rules:
      - "Use async/await over raw promises or callbacks"
      - "Always handle promise rejections — use try/catch or .catch()"
      - "Use environment variables for configuration — never hardcode secrets"
      - "Prefer ESM (import/export) over CommonJS (require) for new code"

  docker:
    name: "Docker"
    detect:
      - file: "Dockerfile"
      - file: "docker-compose.yml"
      - file: "docker-compose.yaml"
      - file: "compose.yml"
      - file: "compose.yaml"
    domain: "docker"
    recall: "docker, container, dockerfile, compose"
    rules:
      - "Use multi-stage builds to minimize final image size"
      - "Pin base image versions (node:20-slim not node:latest)"
      - "Place frequently changing instructions (COPY src/) after stable ones (COPY package.json)"
      - "Use .dockerignore to exclude node_modules, .git, and build artifacts"
      - "Run containers as non-root user (USER node)"

  prisma:
    name: "Prisma"
    detect:
      - file: "prisma/schema.prisma"
      - package_json: "@prisma/client"
    domain: "prisma"
    recall: "prisma, schema, migration, database, orm"
    rules:
      - "Run prisma generate after every schema change"
      - "Use prisma migrate dev for development, prisma migrate deploy for production"
      - "Define explicit relation names when a model has multiple relations to the same table"
      - "Use @map and @@map to keep Prisma naming conventions while matching existing DB columns"

  tailwind:
    name: "Tailwind CSS"
    detect:
      - file: "tailwind.config.*"
      - package_json: "tailwindcss"
    domain: "tailwind"
    recall: "tailwind, utility classes, css"
    rules:
      - "Use utility classes directly in markup — avoid @apply except for base component styles"
      - "Extract repeated class combinations into components, not CSS abstractions"
      - "Use the theme() function in CSS when referencing design tokens"
      - "Configure content paths in tailwind.config to prevent unused CSS in production"
